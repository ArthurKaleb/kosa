<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mini Drive by Kaleb</title>

<style>
/* ==========================================================================
   CONTEÚDO E LAYOUT BASE (Premium Dark UI)
   ========================================================================== */
body {
  margin: 0;
  background: #09090b;
  color: #f4f4f5;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

.app {
  max-width: 1100px;
  margin: auto;
  padding: 40px 20px;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}

h1 {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.5px;
  margin: 0;
}

/* BOTÃO ADICIONAR (+) */
.iconBtn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 1px solid #27272a;
  background: #18181b;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}

.iconBtn:hover {
  background: #27272a;
  border-color: #3f3f46;
  transform: scale(1.05);
}

/* MENU SUSPENSO */
.menu {
  position: absolute;
  right: 0;
  top: 52px;
  background: #18181b;
  border: 1px solid #27272a;
  border-radius: 12px;
  display: none;
  flex-direction: column;
  padding: 6px;
  z-index: 10;
  box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
  min-width: 140px;
}

.menu button {
  background: none;
  border: none;
  color: #e4e4e7;
  padding: 10px 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  border-radius: 8px;
  text-align: left;
  transition: background 0.15s ease;
}

.menu button:hover {
  background: #27272a;
  color: #fff;
}

/* GRID DE CARDS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 20px;
}

/* CARDS COM ANIMAÇÃO E HOVER REFINADO */
.card {
  background: #18181b;
  border: 1px solid #27272a;
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  opacity: 0;
  transform: translateY(16px);
  animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  transition: border-color 0.2s ease, transform 0.2s ease;
}

.card:hover {
  border-color: #3f3f46;
  transform: translateY(-2px);
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* PREVIEW DO CARD */
.preview {
  height: 135px;
  background: #09090b;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  border-bottom: 1px solid #27272a;
  position: relative;
}

.preview img.real {
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
  transition: transform 0.2s ease;
}

.preview img.real:hover {
  transform: scale(1.05);
}

.iconFile {
  width: 44px;
  height: 44px;
  object-fit: contain;
  opacity: 0.8;
}

/* PREVIEW BONITO PARA NOTAS DE TEXTO */
.preview-text {
  padding: 20px;
  font-size: 14px;
  color: #a1a1aa;
  font-style: italic;
  text-align: center;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
  line-height: 1.4;
}

/* LUPA SOBRE A IMAGEM DE PRÉVIA */
.zoom-hint {
  position: absolute;
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 11px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s ease;
}

.preview:hover .zoom-hint {
  opacity: 1;
}

/* ÁREA DE TEXTO/INFORMAÇÕES INTERNAS DO CARD */
.card-body {
  padding: 14px;
  display: flex;
  flex-direction: column;
  flex-grow: 1;
  justify-content: space-between;
}

.card-title {
  font-size: 14px;
  font-weight: 500;
  color: #e4e4e7;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-bottom: 12px;
}

.card-text {
  font-size: 13px;
  color: #e4e4e7;
  line-height: 1.5;
  margin-bottom: 12px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: pre-wrap;
  word-break: break-word;
}

.card-actions {
  display: flex;
  gap: 6px;
  margin-top: auto;
}

/* BOTÕES GERAIS */
button, .btn-link {
  border: none;
  padding: 8px 10px;
  font-size: 12px;
  font-weight: 500;
  border-radius: 6px;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s ease, color 0.2s ease;
}

.view {
  background: #27272a;
  color: #e4e4e7;
  flex-grow: 1;
}
.view:hover {
  background: #3f3f46;
  color: #fff;
}

.download {
  background: #f4f4f5;
  color: #09090b;
  flex-grow: 1;
}
.download:hover { background: #e4e4e7; }

.delete {
  background: transparent;
  border: 1px solid #3f3f46;
  color: #f43f5e;
}
.delete:hover { 
  background: #f43f5e; 
  color: #fff; 
  border-color: #f43f5e;
}

.delete-full {
  width: 100%;
  background: #27272a;
  border: none;
}
.delete-full:hover {
  background: #f43f5e;
}

/* ==========================================================================
   MODAIS (TEXTO E PRÉVIA DE IMAGEM)
   ========================================================================== */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

.modal {
  width: 90%;
  max-width: 500px;
  background: #18181b;
  border: 1px solid #27272a;
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

.modal h3 {
  margin: 0 0 16px 0;
  font-size: 18px;
  font-weight: 600;
}

.modal textarea {
  width: 100%;
  height: 180px;
  background: #09090b;
  color: #fff;
  border: 1px solid #27272a;
  border-radius: 10px;
  padding: 14px;
  font-size: 14px;
  line-height: 1.5;
  resize: none;
  outline: none;
  box-sizing: border-box;
  font-family: inherit;
  transition: border-color 0.2s;
}

.modal textarea:focus {
  border-color: #a1a1aa;
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 16px;
}

.modal-actions button {
  padding: 10px 16px;
  font-size: 13px;
}

.btn-cancel {
  background: transparent;
  color: #a1a1aa;
}
.btn-cancel:hover { color: #fff; }

.save {
  background: #f4f4f5;
  color: #09090b;
}
.save:hover { background: #e4e4e7; }

/* PRÉVIA DE IMAGEM (VIEWER) */
#imageViewer {
  flex-direction: column;
}
#previewExpanded {
  max-width: 90vw;
  max-height: 85vh;
  object-fit: contain;
  border-radius: 8px;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
}
.close-viewer {
  position: absolute;
  top: 20px;
  right: 30px;
  color: #a1a1aa;
  font-size: 36px;
  cursor: pointer;
  transition: color 0.2s;
}
.close-viewer:hover { color: #fff; }
</style>
</head>

<body>

<div class="app">

<header>
  <h1>Mini Drive by Kaleb</h1>

  <div style="position:relative">
    <button class="iconBtn" id="plus">+</button>

    <div class="menu" id="menu">
      <button onclick="selectFile()">
        <img src="av.png" width="16" style="opacity: 0.8;"> Arquivo
      </button>
      <button onclick="openModal()">
        <img src="tx.png" width="16" style="opacity: 0.8;"> Texto
      </button>
    </div>

    <input type="file" id="file" multiple style="display:none">
  </div>
</header>

<div class="grid" id="grid"></div>

</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>Escreva seu texto</h3>
    <textarea id="textInput" placeholder="Digite seu bloco de notas aqui..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="save" onclick="saveText()">Salvar</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="imageViewer" onclick="closeViewer()">
  <span class="close-viewer">&times;</span>
  <img id="previewExpanded" src="" onclick="(e) => e.stopPropagation()">
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
"https://uosubywnpexfdykxrsda.supabase.co",
"sb_publishable_c7Gcs7TYe8elQ-lZ50cjUA_EERGehuQ"
);

const BUCKET="arquivos";
const TABLE="arquivos";

const grid=document.getElementById("grid");
const menu=document.getElementById("menu");
const fileInput=document.getElementById("file");

/* ===========================
   MENU E MODAIS
=========================== */
document.getElementById("plus").onclick=(e)=>{
  e.stopPropagation();
  menu.style.display = menu.style.display==="flex"?"none":"flex";
};

document.addEventListener("click",(e)=>{
  if(!menu.contains(e.target) && e.target.id!=="plus"){
    menu.style.display="none";
  }
});

window.openModal=()=>{
  menu.style.display="none";
  document.getElementById("modal").style.display="flex";
  setTimeout(()=>{
    document.getElementById("textInput").focus();
  },100);
};

window.closeModal=()=>{
  document.getElementById("modal").style.display="none";
};

/* ===========================
   PRÉVIA DA IMAGEM
=========================== */
window.openViewer=(url)=>{
  document.getElementById("previewExpanded").src = url;
  document.getElementById("imageViewer").style.display="flex";
};

window.closeViewer=()=>{
  document.getElementById("imageViewer").style.display="none";
  document.getElementById("previewExpanded").src = ""; 
};

/* ===========================
   DOWNLOAD FORÇADO (BLOB)
=========================== */
window.forceDownload = async (url, filename) => {
  try {
    const response = await fetch(url);
    const blob = await response.blob();
    
    const blobUrl = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = filename; 
    
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    window.URL.revokeObjectURL(blobUrl);
  } catch (error) {
    console.error("Erro ao forçar download, abrindo em nova guia", error);
    window.open(url, '_blank');
  }
};

/* ===========================
   TEXTO E ARQUIVOS (CRUD)
=========================== */
window.saveText=async()=>{
  const text=document.getElementById("textInput").value;
  if(!text.trim()) return;

  // Corrigido adicionando tamanho: null conforme a estrutura real da tabela
  const { error } = await supabase.from(TABLE).insert({
    tipo_item: "text",
    content: text,
    nome: null,
    tipo: null,
    tamanho: null,
    url: null,
    caminho: null,
    criado_em: new Date()
  });

  if (error) {
    alert("Erro do Supabase ao salvar texto: " + error.message);
    console.error(error);
  } else {
    document.getElementById("textInput").value="";
    closeModal();
    load();
  }
};

window.selectFile=()=>{
  menu.style.display="none";
  fileInput.click();
};

fileInput.onchange=async(e)=>{
  for(let file of e.target.files){
    const path=`${Date.now()}_${file.name}`;
    try {
      const uploadRes = await supabase.storage.from(BUCKET).upload(path,file);
      if(uploadRes.error) throw uploadRes.error;

      const {data}=supabase.storage.from(BUCKET).getPublicUrl(path);

      const insertRes = await supabase.from(TABLE).insert({
        nome:file.name,
        tipo:file.type,
        tamanho: file.size, // Passando o tamanho real do arquivo
        url:data.publicUrl,
        caminho:path,
        tipo_item:"file",
        content: null,
        criado_em:new Date()
      });
      if(insertRes.error) throw insertRes.error;

    } catch (error) {
      alert("Erro no arquivo: " + error.message);
      console.error(error);
    }
  }
  load();
};

async function load(){
  try {
    const {data, error}=await supabase
    .from(TABLE)
    .select("*")
    .order("criado_em",{ascending:false});

    if(error) throw error;

    grid.innerHTML="";
    if(!data) return;

    data.forEach((item,i)=>{
      const div=document.createElement("div");
      div.className="card";
      div.style.animationDelay = `${i * 80}ms`;

      // Armazena o ID correto baseado na coluna da sua tabela (uuid)
      const itemId = item.uuid;

      if(item.tipo_item==="file"){
        const isImage = item.tipo?.startsWith("image/");
        
        div.innerHTML=`
          <div class="preview">
            ${isImage
              ? `<img class="real" src="${item.url}" onclick="openViewer('${item.url}')">
                 <span class="zoom-hint">🔍 Expandir</span>`
              : `<img class="iconFile" src="av.png">`}
          </div>
          <div class="card-body">
            <div class="card-title" title="${item.nome}">${item.nome}</div>
            <div class="card-actions">
              <button class="view" onclick="window.open('${item.url}', '_blank')">Ver</button>
              <button class="download" onclick="forceDownload('${item.url}', '${item.nome}')">Baixar</button>
              <button class="delete" onclick="del('${itemId}','${item.caminho || ''}')">Excluir</button>
            </div>
          </div>
        `;
      } else {
        // Renderização otimizada para blocos de notas (mostra o texto na prévia)
        div.innerHTML=`
          <div class="preview">
            <div class="preview-text">${item.content || ""}</div>
          </div>
          <div class="card-body">
            <div class="card-text">${item.content || ""}</div>
            <div class="card-actions">
              <button class="delete delete-full" onclick="del('${itemId}','')">Excluir Nota</button>
            </div>
          </div>
        `;
      }
      grid.appendChild(div);
    });
  } catch (error) {
    console.error("Erro ao carregar dados:", error);
  }
}

window.del=async(id,path)=>{
  try {
    if(path && path.trim() !== ""){
      await supabase.storage.from(BUCKET).remove([path]);
    }
    // Alterado o filtro de .eq("id", id) para .eq("uuid", id) combinando com a tabela
    const { error } = await supabase.from(TABLE).delete().eq("uuid", id);
    if(error) throw error;
    load();
  } catch (error) {
    alert("Erro ao deletar: " + error.message);
    console.error(error);
  }
};

load();
</script>

</body>
</html>
