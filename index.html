<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Drive Melhorado</title>

<style>
body{
  margin:0;
  background:#050505;
  color:#fff;
  font-family:Arial;
}

/* APP */
.app{
  max-width:1100px;
  margin:auto;
  padding:30px;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

h1{
  margin-left:10px;
  font-size:22px;
}

/* BOTÕES */
.iconBtn{
  width:45px;
  height:45px;
  border-radius:50%;
  border:1px solid #333;
  background:#111;
  color:#fff;
  font-size:22px;
  cursor:pointer;
}

/* MENU */
.menu{
  position:absolute;
  right:30px;
  top:70px;
  background:#111;
  border:1px solid #333;
  border-radius:10px;
  display:none;
  flex-direction:column;
  z-index:10;
}

.menu button{
  background:none;
  border:none;
  color:#fff;
  padding:12px;
  cursor:pointer;
}

/* GRID */
.grid{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:#111;
  padding:12px;
  border-radius:12px;
  animation:fade .25s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

.preview{
  height:140px;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
}

img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* BOTÕES */
button,a{
  border:none;
  padding:7px;
  font-size:12px;
  border-radius:6px;
  cursor:pointer;
  text-decoration:none;
}

.download{background:#fff;color:#000}
.delete{background:#222;color:red}
.copy{background:#fff;color:#000}
.save{background:#333;color:#fff}

/* =========================
   MODAL DE TEXTO (NOVO)
========================= */

.modal-bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal{
  width:90%;
  max-width:500px;
  background:#111;
  padding:20px;
  border-radius:12px;
}

.modal textarea{
  width:100%;
  height:150px;
  background:#000;
  color:#fff;
  border:1px solid #333;
  border-radius:10px;
  padding:10px;
  resize:none;
}

.modal-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="app">

<header>
  <h1>Drive Melhorado</h1>

  <div style="position:relative">

    <button class="iconBtn" id="plus">+</button>

    <div class="menu" id="menu">
      <button onclick="selectFile()">Arquivo</button>
      <button onclick="openTextModal()">Texto</button>
    </div>

    <input type="file" id="file" multiple style="display:none">
  </div>
</header>

<div class="grid" id="grid"></div>

</div>

<!-- =========================
     MODAL TEXTO
========================= -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>Escreva seu texto</h3>

    <textarea id="textInput"></textarea>

    <div class="modal-actions">
      <button onclick="closeModal()">Cancelar</button>
      <button class="save" onclick="saveText()">Salvar</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
"https://uosubywnpexfdykxrsda.supabase.co",
"sb_publishable_c7Gcs7TYe8elQ-lZ50cjUA_EERGehuQ"
);

const BUCKET="arquivos";
const TABLE="arquivos";

const grid=document.getElementById("grid");
const menu=document.getElementById("menu");
const fileInput=document.getElementById("file");

let textBuffer="";

/* MENU */
document.getElementById("plus").onclick=()=>{
  menu.style.display = menu.style.display==="flex"?"none":"flex";
};

/* FECHAR MENU */
document.addEventListener("click",(e)=>{
  if(!menu.contains(e.target) && e.target.id!=="plus"){
    menu.style.display="none";
  }
});

/* =========================
   MODAL TEXT
========================= */

window.openTextModal=()=>{
  document.getElementById("modal").style.display="flex";
};

window.closeModal=()=>{
  document.getElementById("modal").style.display="none";
};

window.saveText=async()=>{

  const value=document.getElementById("textInput").value;
  if(!value) return;

  await supabase.from(TABLE).insert({
    tipo_item:"text",
    content:value,
    criado_em:new Date()
  });

  document.getElementById("textInput").value="";
  closeModal();
  load();
};

/* =========================
   UPLOAD
========================= */

window.selectFile=()=>{
  fileInput.click();
};

fileInput.onchange=async(e)=>{

  for(let file of e.target.files){

    const path=`${Date.now()}_${file.name}`;

    await supabase.storage
    .from(BUCKET)
    .upload(path,file);

    const {data}=supabase.storage
    .from(BUCKET)
    .getPublicUrl(path);

    await supabase.from(TABLE).insert({
      nome:file.name,
      tipo:file.type,
      url:data.publicUrl,
      caminho:path,
      tipo_item:"file",
      content:"",
      criado_em:new Date()
    });
  }

  load();
};

/* =========================
   DOWNLOAD FORÇADO
========================= */

async function forceDownload(url,name){

  const res=await fetch(url);
  const blob=await res.blob();

  const link=document.createElement("a");
  link.href=URL.createObjectURL(blob);
  link.download=name;
  document.body.appendChild(link);
  link.click();
  link.remove();
}

/* =========================
   LOAD
========================= */

async function load(){

  const {data}=await supabase
  .from(TABLE)
  .select("*")
  .order("criado_em",{ascending:false});

  grid.innerHTML="";

  data.forEach((item,i)=>{

    const div=document.createElement("div");
    div.className="card";
    div.style.animationDelay=`${i*120}ms`;

    if(item.tipo_item==="file"){

      div.innerHTML=`
        <div class="preview">
          ${item.tipo?.startsWith("image/")
            ? `<img src="${item.url}">`
            : "📄"}
        </div>

        <div>${item.nome}</div>

        <button class="download" onclick="downloadFile('${item.url}','${item.nome}')">
          Baixar
        </button>

        <button class="delete" onclick="del('${item.id}','${item.caminho}')">
          Excluir
        </button>
      `;
    }

    else{

      div.innerHTML=`
        <div>📝 ${item.content}</div>
      `;
    }

    grid.appendChild(div);
  });
}

/* DOWNLOAD */
window.downloadFile=(url,name)=>{
  forceDownload(url,name);
};

/* DELETE */
window.del=async(id,path)=>{

  if(path){
    await supabase.storage.from(BUCKET).remove([path]);
  }

  await supabase.from(TABLE).delete().eq("id",id);

  load();
};

load();
</script>

</body>
</html>
