<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Drive Final Estável</title>

<style>
/* ==========================================================================
   CONTEÚDO E LAYOUT BASE (Premium Dark UI)
   ========================================================================== */
body {
  margin: 0;
  background: #09090b;
  color: #f4f4f5;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

.app {
  max-width: 1100px;
  margin: auto;
  padding: 40px 20px;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}

h1 {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.5px;
  margin: 0;
}

/* BOTÃO ADICIONAR (+) */
.iconBtn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 1px solid #27272a;
  background: #18181b;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}

.iconBtn:hover {
  background: #27272a;
  border-color: #3f3f46;
  transform: scale(1.05);
}

/* MENU SUSPENSO */
.menu {
  position: absolute;
  right: 0;
  top: 52px;
  background: #18181b;
  border: 1px solid #27272a;
  border-radius: 12px;
  display: none;
  flex-direction: column;
  padding: 6px;
  z-index: 10;
  box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
  min-width: 140px;
}

.menu button {
  background: none;
  border: none;
  color: #e4e4e7;
  padding: 10px 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  border-radius: 8px;
  text-align: left;
  transition: background 0.15s ease;
}

.menu button:hover {
  background: #27272a;
  color: #fff;
}

/* GRID DE CARDS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 20px;
}

/* CARDS COM ANIMAÇÃO E HOVER REFINADO */
.card {
  background: #18181b;
  border: 1px solid #27272a;
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  opacity: 0;
  transform: translateY(16px);
  animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  transition: border-color 0.2s ease, transform 0.2s ease;
}

.card:hover {
  border-color: #3f3f46;
  transform: translateY(-2px);
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* PREVIEW DO CARD */
.preview {
  height: 135px;
  background: #09090b;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  border-bottom: 1px solid #27272a;
}

.preview img.real {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.iconFile {
  width: 44px;
  height: 44px;
  object-fit: contain;
  opacity: 0.8;
}

/* ÁREA DE TEXTO/INFORMAÇÕES INTERNAS DO CARD */
.card-body {
  padding: 14px;
  display: flex;
  flex-direction: column;
  flex-grow: 1;
  justify-content: space-between;
}

.card-title {
  font-size: 14px;
  font-weight: 500;
  color: #e4e4e7;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-bottom: 12px;
}

.card-text {
  font-size: 13px;
  color: #a1a1aa;
  line-height: 1.5;
  margin-bottom: 12px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: pre-wrap;
  word-break: break-word;
}

.card-actions {
  display: flex;
  gap: 8px;
  margin-top: auto;
}

/* BOTÕES GERAIS */
button, .btn-link {
  border: none;
  padding: 8px 12px;
  font-size: 13px;
  font-weight: 500;
  border-radius: 8px;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s ease, color 0.2s ease;
}

.download {
  background: #f4f4f5;
  color: #09090b;
  flex-grow: 1;
}
.download:hover { background: #e4e4e7; }

.delete {
  background: #27272a;
  color: #f43f5e;
}
.delete:hover { 
  background: #f43f5e; 
  color: #fff; 
}

.delete-full {
  width: 100%;
}

/* ==========================================================================
   MODAL DE TEXTO OTIMIZADO
   ========================================================================== */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

.modal {
  width: 90%;
  max-width: 500px;
  background: #18181b;
  border: 1px solid #27272a;
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

.modal h3 {
  margin: 0 0 16px 0;
  font-size: 18px;
  font-weight: 600;
}

.modal textarea {
  width: 100%;
  height: 180px;
  background: #09090b;
  color: #fff;
  border: 1px solid #27272a;
  border-radius: 10px;
  padding: 14px;
  font-size: 14px;
  line-height: 1.5;
  resize: none;
  outline: none;
  box-sizing: border-box;
  font-family: inherit;
  transition: border-color 0.2s;
}

.modal textarea:focus {
  border-color: #a1a1aa;
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 16px;
}

.modal-actions button {
  padding: 10px 16px;
}

.btn-cancel {
  background: transparent;
  color: #a1a1aa;
}
.btn-cancel:hover { color: #fff; }

.save {
  background: #f4f4f5;
  color: #09090b;
}
.save:hover { background: #e4e4e7; }
</style>
</head>

<body>

<div class="app">

<header>
  <h1>Drive Final Estável</h1>

  <div style="position:relative">
    <button class="iconBtn" id="plus">+</button>

    <div class="menu" id="menu">
      <button onclick="selectFile()">
        <img src="av.png" width="16" style="opacity: 0.8;"> Arquivo
      </button>
      <button onclick="openModal()">
        <img src="tx.png" width="16" style="opacity: 0.8;"> Texto
      </button>
    </div>

    <input type="file" id="file" multiple style="display:none">
  </div>
</header>

<div class="grid" id="grid"></div>

</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>Escreva seu texto</h3>
    <textarea id="textInput" placeholder="Digite seu bloco de notas aqui..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="save" onclick="saveText()">Salvar</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
"https://uosubywnpexfdykxrsda.supabase.co",
"sb_publishable_c7Gcs7TYe8elQ-lZ50cjUA_EERGehuQ"
);

const BUCKET="arquivos";
const TABLE="arquivos";

const grid=document.getElementById("grid");
const menu=document.getElementById("menu");
const fileInput=document.getElementById("file");

/* MENU INTERATIVO */
document.getElementById("plus").onclick=(e)=>{
  e.stopPropagation();
  menu.style.display = menu.style.display==="flex"?"none":"flex";
};

document.addEventListener("click",(e)=>{
  if(!menu.contains(e.target) && e.target.id!=="plus"){
    menu.style.display="none";
  }
});

/* CONTROLE DO MODAL */
window.openModal=()=>{
  menu.style.display="none";
  document.getElementById("modal").style.display="flex";
  setTimeout(()=>{
    document.getElementById("textInput").focus();
  },100);
};

window.closeModal=()=>{
  document.getElementById("modal").style.display="none";
};

window.saveText=async()=>{
  const text=document.getElementById("textInput").value;
  if(!text.trim()) return;

  try {
    await supabase.from(TABLE).insert({
      tipo_item:"text",
      content:text,
      criado_em:new Date()
    });
    document.getElementById("textInput").value="";
    closeModal();
    load();
  } catch (error) {
    console.error("Erro ao salvar texto:", error);
  }
};

/* OPERAÇÕES DE ARQUIVO */
window.selectFile=()=>{
  menu.style.display="none";
  fileInput.click();
};

fileInput.onchange=async(e)=>{
  for(let file of e.target.files){
    const path=`${Date.now()}_${file.name}`;
    try {
      await supabase.storage.from(BUCKET).upload(path,file);
      const {data}=supabase.storage.from(BUCKET).getPublicUrl(path);

      await supabase.from(TABLE).insert({
        nome:file.name,
        tipo:file.type,
        url:data.publicUrl,
        caminho:path,
        tipo_item:"file",
        criado_em:new Date()
      });
    } catch (error) {
      console.error("Erro no upload de arquivo:", error);
    }
  }
  load();
};

/* RENDERIZAÇÃO E ATUALIZAÇÃO DA GRADE */
async function load(){
  try {
    const {data}=await supabase
    .from(TABLE)
    .select("*")
    .order("criado_em",{ascending:false});

    grid.innerHTML="";
    if(!data) return;

    data.forEach((item,i)=>{
      const div=document.createElement("div");
      div.className="card";
      div.style.animationDelay = `${i * 80}ms`; // Animação staggered fluida

      if(item.tipo_item==="file"){
        div.innerHTML=`
          <div class="preview">
            ${item.tipo?.startsWith("image/")
              ? `<img class="real" src="${item.url}">`
              : `<img class="iconFile" src="av.png">`}
          </div>
          <div class="card-body">
            <div class="card-title" title="${item.nome}">${item.nome}</div>
            <div class="card-actions">
              <a class="btn-link download" href="${item.url}" download target="_blank">Baixar</a>
              <button class="delete" onclick="del('${item.id}','${item.caminho || ''}')">Excluir</button>
            </div>
          </div>
        `;
      } else {
        div.innerHTML=`
          <div class="preview">
            <img class="iconFile" src="tx.png">
          </div>
          <div class="card-body">
            <div class="card-text">${item.content}</div>
            <div class="card-actions">
              <button class="delete delete-full" onclick="del('${item.id}','')">Excluir Nota</button>
            </div>
          </div>
        `;
      }
      grid.appendChild(div);
    });
  } catch (error) {
    console.error("Erro ao carregar dados:", error);
  }
}

/* EXCLUSÃO SEGUIDA DE LIMPEZA */
window.del=async(id,path)=>{
  try {
    if(path && path.trim() !== ""){
      await supabase.storage.from(BUCKET).remove([path]);
    }
    await supabase.from(TABLE).delete().eq("id",id);
    load();
  } catch (error) {
    console.error("Erro ao deletar item:", error);
  }
};

// Executa na carga inicial da página
load();
</script>

</body>
</html>
