<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kaleb Hub - Assistente Pessoal</title>

<style>
/* ==========================================================================
   LAYOUT E SIDEBAR (Premium Dark Hub)
   ========================================================================== */
:root {
  --bg-main: #09090b;
  --bg-card: #18181b;
  --border: #27272a;
  --accent: #f4f4f5;
  --text-dim: #a1a1aa;
  --sidebar-w: 260px;
}

body {
  margin: 0;
  background: var(--bg-main);
  color: var(--accent);
  font-family: system-ui, -apple-system, sans-serif;
  display: flex;
  min-height: 100vh;
  overflow: hidden;
}

/* SIDEBAR */
.sidebar {
  width: var(--sidebar-w);
  background: #0c0c0e;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 30px 15px;
  z-index: 100;
}

.logo {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 40px;
  padding-left: 15px;
  letter-spacing: -1px;
}

.nav-item {
  display: flex;
  align-items: center;
  padding: 12px 15px;
  color: var(--text-dim);
  text-decoration: none;
  border-radius: 10px;
  margin-bottom: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.nav-item img {
  margin-right: 12px;
}

.nav-item:hover, .nav-item.active {
  background: var(--bg-card);
  color: #fff;
}

/* ÁREA DE CONTEÚDO PRINCIPAL */
main {
  flex-grow: 1;
  height: 100vh;
  overflow-y: auto;
  position: relative;
  padding: 40px;
  box-sizing: border-box;
}

.view { display: none; }
.view.active { display: block; animation: fadeIn 0.3s ease; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ==========================================================================
   PÁGINA INICIAL (MURAL)
   ========================================================================== */
.welcome-msg { margin-bottom: 40px; }
.welcome-msg h2 { font-size: 32px; font-weight: 700; margin: 0; }
.welcome-msg p { color: var(--text-dim); margin-top: 8px; }

.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
}

.mural-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
}

.mural-card h4 { margin: 0 0 15px 0; font-size: 16px; color: var(--text-dim); }
.stat-val { font-size: 36px; font-weight: 700; }

/* ==========================================================================
   POMODORO
   ========================================================================== */
.pomodoro-container {
  max-width: 400px;
  margin: 100px auto;
  text-align: center;
  background: var(--bg-card);
  padding: 40px;
  border-radius: 30px;
  border: 1px solid var(--border);
}

#timer { font-size: 80px; font-weight: 800; margin: 20px 0; font-variant-numeric: tabular-nums; }
.pomo-btns { display: flex; justify-content: center; gap: 15px; }

/* ==========================================================================
   MINI DRIVE (ESTILO ANTERIOR ADAPTADO)
   ========================================================================== */
.drive-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
}

.card {
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.dots-btn {
  position: absolute; top: 10px; right: 10px; width: 30px; height: 30px; border-radius: 50%;
  background: rgba(0,0,0,0.5); border: none; color: #fff; cursor: pointer; z-index: 5;
}

.card-menu {
  position: absolute; top: 45px; right: 10px; background: #1c1c1f; border: 1px solid var(--border);
  border-radius: 10px; display: none; flex-direction: column; padding: 5px; z-index: 20; min-width: 145px;
}

.card-menu button { background: none; border: none; color: #fff; padding: 10px; text-align: left; font-size: 13px; cursor: pointer; border-radius: 5px; }
.card-menu button:hover { background: #27272a; }

.preview { height: 120px; background: #000; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--border); }
.preview img.real { width: 100%; height: 100%; object-fit: cover; }
.preview-text { padding: 15px; font-size: 12px; color: var(--text-dim); overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; }

.card-body { padding: 12px; }
.card-title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-dim); }

/* ==========================================================================
   MODAIS E BOTÕES
   ========================================================================== */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(5px); }
.modal { background: var(--bg-card); padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; border: 1px solid var(--border); }
.modal textarea, .modal input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 12px; box-sizing: border-box; outline: none; }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

.btn-p { background: #fff; color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; }
.btn-s { background: transparent; color: var(--text-dim); border: none; padding: 10px 20px; cursor: pointer; }

.plus-btn { background: #fff; color: #000; width: 40px; height: 40px; border-radius: 50%; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* ESTILO DA PROPRIEDADE */
.prop-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.prop-label { color: var(--text-dim); }
.prop-value { color: #fff; text-align: right; }
</style>
</head>

<body>

<nav class="sidebar">
  <div class="logo">K Hub.</div>
  
  <div class="nav-item active" onclick="switchPage('home', this)">
    <img src="hm.png" width="20" height="20" style="opacity: 0.8; object-fit: contain;"> Início
  </div>
  
  <div class="nav-item" onclick="switchPage('drive', this)">
    <img src="fl.png" width="20" height="20" style="opacity: 0.8; object-fit: contain;"> Mini Drive
  </div>
  
  <div class="nav-item" onclick="switchPage('pomodoro', this)">
    <img src="pd.png" width="20" height="20" style="opacity: 0.8; object-fit: contain;"> Pomodoro
  </div>
  
  <div class="nav-item" style="opacity: 0.4; cursor: not-allowed;">
    <img src="ia.png" width="20" height="20" style="opacity: 0.8; object-fit: contain;"> Assistente IA
  </div>
</nav>

<main>

  <section id="home" class="view active">
    <div class="welcome-msg">
      <h2>Bem-vindo Kaleb</h2>
      <p id="currentDate"></p>
    </div>

    <div class="dashboard-grid">
      <div class="mural-card">
        <h4>Arquivos no Drive</h4>
        <div class="stat-val" id="countFiles">0</div>
      </div>
      <div class="mural-card">
        <h4>Notas Salvas</h4>
        <div class="stat-val" id="countNotes">0</div>
      </div>
      <div class="mural-card" id="recentNoteBox" style="grid-column: span 1;">
        <h4>Lembrete Recente</h4>
        <p id="recentNoteText" style="font-size: 14px; color: var(--text-dim);">Nenhuma nota recente.</p>
      </div>
    </div>
  </section>

  <section id="drive" class="view">
    <div class="drive-header">
      <h3>Meus Arquivos</h3>
      <div style="position:relative">
        <button class="plus-btn" id="drivePlus">+</button>
        <div class="card-menu" id="plusMenu" style="top: 50px; right: 0;">
          <button onclick="selectFile()">📁 Enviar Arquivo</button>
          <button onclick="openModal()">📝 Nova Nota</button>
        </div>
      </div>
    </div>
    
    <input type="file" id="fileInput" multiple style="display:none">
    <div class="grid" id="grid"></div>
  </section>

  <section id="pomodoro" class="view">
    <div class="pomodoro-container">
      <h3 id="pomoStatus">Foco</h3>
      <div id="timer">25:00</div>
      <div class="pomo-btns">
        <button class="btn-p" id="startPomo">Iniciar</button>
        <button class="btn-s" id="resetPomo">Resetar</button>
      </div>
      <div style="margin-top: 30px; display: flex; gap: 10px; justify-content: center;">
         <button onclick="setPomo(25)" class="btn-s" style="font-size: 11px;">Foco</button>
         <button onclick="setPomo(5)" class="btn-s" style="font-size: 11px;">Pausa Curta</button>
      </div>
    </div>
  </section>

</main>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>Nova Nota</h3>
    <textarea id="textInput" placeholder="O que você está pensando?"></textarea>
    <div class="modal-actions">
      <button class="btn-s" onclick="closeModal()">Cancelar</button>
      <button class="btn-p" onclick="saveText()">Salvar Nota</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="editModal">
  <div class="modal">
    <h3>Editar Nota</h3>
    <textarea id="editTextInput"></textarea>
    <div class="modal-actions">
      <button class="btn-s" onclick="closeEditModal()">Cancelar</button>
      <button class="btn-p" onclick="updateText()">Atualizar</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="propertiesModal">
  <div class="modal">
    <h3>Propriedades</h3>
    <div id="propsContent"></div>
    <div class="modal-actions">
      <button class="btn-p" onclick="closeProps()">Fechar</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
"https://uosubywnpexfdykxrsda.supabase.co",
"sb_publishable_c7Gcs7TYe8elQ-lZ50cjUA_EERGehuQ"
);

const BUCKET="arquivos";
const TABLE="arquivos";

let cacheItens = [];

// NAVEGAÇÃO
window.switchPage = (pageId, el) => {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  if(el) el.classList.add('active');
  if(pageId === 'home') updateDashboard();
};

// DATA NA HOME
const d = new Date();
document.getElementById('currentDate').innerText = d.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });

/* ===========================
   FORMATADORES AUXILIARES
=========================== */
function formatBytes(bytes) {
  if (!bytes || bytes === 0) return '0 Bytes';
  const k = 1024;
  const sizes = ['Bytes', 'KB', 'MB', 'GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

function formatDate(dateString) {
  if (!dateString) return 'N/A';
  const date = new Date(dateString);
  return date.toLocaleDateString('pt-BR') + ' às ' + date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

/* ===========================
   LOGICA DRIVE
=========================== */
const grid = document.getElementById("grid");
const drivePlus = document.getElementById("drivePlus");
const plusMenu = document.getElementById("plusMenu");

drivePlus.onclick = (e) => {
  e.stopPropagation();
  plusMenu.style.display = plusMenu.style.display === 'flex' ? 'none' : 'flex';
};

document.addEventListener('click', () => {
  plusMenu.style.display = 'none';
  document.querySelectorAll('.card-menu').forEach(m => m.style.display = 'none');
});

window.openModal = () => document.getElementById("modal").style.display = "flex";
window.closeModal = () => document.getElementById("modal").style.display = "none";

window.saveText = async () => {
  const text = document.getElementById("textInput").value;
  if(!text.trim()) return;
  await supabase.from(TABLE).insert({ tipo_item: "text", content: text, nome: text.substring(0,20), criado_em: new Date(), url: 'note', caminho: 'note' });
  document.getElementById("textInput").value = "";
  closeModal(); load();
};

window.selectFile = () => document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange = async (e) => {
  for(let file of e.target.files){
    const path = `${Date.now()}_${file.name}`;
    await supabase.storage.from(BUCKET).upload(path, file);
    const {data} = supabase.storage.from(BUCKET).getPublicUrl(path);
    await supabase.from(TABLE).insert({ nome: file.name, tipo: file.type, tamanho: file.size, url: data.publicUrl, caminho: path, tipo_item: "file", criado_em: new Date() });
  }
  load();
};

async function load(){
  const {data} = await supabase.from(TABLE).select("*").order("criado_em", {ascending: false});
  grid.innerHTML = "";
  if(!data) return;
  cacheItens = data;

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";
    const itemId = item.id;
    const isNote = item.tipo_item === 'text';

    div.innerHTML = `
      <button class="dots-btn" onclick="event.stopPropagation(); toggleMenu('${itemId}')">⋮</button>
      <div class="card-menu" id="menu-${itemId}">
        ${isNote 
          ? `<button onclick="editNote('${itemId}', \`${encodeURIComponent(item.content)}\`)">Editar</button>` 
          : `<button onclick="window.open('${item.url}')">Ver</button>
             <button onclick="openProperties('${itemId}')">Propriedades</button>`
        }
        <button onclick="del('${itemId}', '${item.caminho}')" style="color:#f43f5e">Excluir</button>
      </div>
      <div class="preview">
        ${isNote ? `<div class="preview-text">${item.content}</div>` : (item.tipo?.startsWith("image") ? `<img src="${item.url}" class="real">` : `<img src="fl.png" width="32" style="opacity:0.5; object-fit:contain;">`)}
      </div>
      <div class="card-body">
        <div class="card-title">${item.nome || 'Nota'}</div>
      </div>
    `;
    grid.appendChild(div);
  });
  updateDashboard(data);
}

window.toggleMenu = (id) => {
  const m = document.getElementById(`menu-${id}`);
  m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
};

window.openProperties = (id) => {
  const item = cacheItens.find(i => i.id == id);
  if(!item) return;

  const content = document.getElementById("propsContent");
  content.innerHTML = `
    <div class="prop-row"><span class="prop-label">Nome:</span><span class="prop-value">${item.nome}</span></div>
    <div class="prop-row"><span class="prop-label">Tamanho:</span><span class="prop-value">${formatBytes(item.tamanho)}</span></div>
    <div class="prop-row"><span class="prop-label">Tipo:</span><span class="prop-value">${item.tipo || 'Desconhecido'}</span></div>
    <div class="prop-row"><span class="prop-label">Criado em:</span><span class="prop-value">${formatDate(item.criado_em)}</span></div>
  `;
  document.getElementById("propertiesModal").style.display = "flex";
};

window.closeProps = () => document.getElementById("propertiesModal").style.display = "none";

window.del = async (id, path) => {
  if(path && path !== 'note') await supabase.storage.from(BUCKET).remove([path]);
  await supabase.from(TABLE).delete().eq("id", id);
  load();
};

/* ===========================
   POMODORO
=========================== */
let timer;
let minutes = 25;
let seconds = 0;
let isRunning = false;

const timerEl = document.getElementById('timer');
const startBtn = document.getElementById('startPomo');

window.setPomo = (m) => {
  clearInterval(timer);
  isRunning = false;
  minutes = m;
  seconds = 0;
  updateTimerDisplay();
  startBtn.innerText = "Iniciar";
};

function updateTimerDisplay() {
  timerEl.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
}

startBtn.onclick = () => {
  if(isRunning) {
    clearInterval(timer);
    startBtn.innerText = "Retomar";
  } else {
    timer = setInterval(() => {
      if(seconds === 0) {
        if(minutes === 0) {
          clearInterval(timer);
          alert("Ciclo finalizado!");
          return;
        }
        minutes--;
        seconds = 59;
      } else {
        seconds--;
      }
      updateTimerDisplay();
    }, 1000);
    startBtn.innerText = "Pausar";
  }
  isRunning = !isRunning;
};

document.getElementById('resetPomo').onclick = () => setPomo(25);

/* ===========================
   DASHBOARD
=========================== */
async function updateDashboard(preData) {
  const data = preData || (await supabase.from(TABLE).select("*")).data;
  if(!data) return;
  
  const files = data.filter(i => i.tipo_item === 'file').length;
  const notes = data.filter(i => i.tipo_item === 'text').length;
  const lastNote = data.find(i => i.tipo_item === 'text');

  document.getElementById('countFiles').innerText = files;
  document.getElementById('countNotes').innerText = notes;
  if(lastNote) document.getElementById('recentNoteText').innerText = lastNote.content;
}

load();
switchPage('home');
</script>

</body>
</html>
