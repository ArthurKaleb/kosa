<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Drive Final Corrigido</title>

<style>
body{
  margin:0;
  background:#050505;
  color:#fff;
  font-family:Arial;
}

.app{
  max-width:1100px;
  margin:auto;
  padding:30px;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

h1{
  font-size:22px;
  margin-left:10px;
}

/* BOTÃO + */
.iconBtn{
  width:45px;
  height:45px;
  border-radius:50%;
  border:1px solid #333;
  background:#111;
  color:#fff;
  font-size:22px;
  cursor:pointer;
}

/* MENU */
.menu{
  position:absolute;
  right:30px;
  top:70px;
  background:#111;
  border:1px solid #333;
  border-radius:10px;
  display:none;
  flex-direction:column;
  z-index:10;
}

.menu button{
  background:none;
  border:none;
  color:#fff;
  padding:12px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:10px;
}

.menu button:hover{
  background:#222;
}

/* GRID */
.grid{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:#111;
  padding:12px;
  border-radius:12px;
  animation:fade .25s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

/* PREVIEW */
.preview{
  height:140px;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  overflow:hidden;
}

/* PDF / ARQUIVO */
.iconFile{
  width:48px;
  height:48px;
  object-fit:contain;
  opacity:0.9;
}

/* IMAGEM REAL */
.preview img.real{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TEXTO */
textarea{
  width:100%;
  min-height:120px;
  background:#000;
  color:#fff;
  border:1px solid #333;
  border-radius:10px;
  padding:10px;
  resize:none;
}

/* ACTIONS */
.actions{
  display:flex;
  gap:5px;
  margin-top:6px;
}

button,a{
  border:none;
  padding:7px;
  font-size:12px;
  border-radius:6px;
  cursor:pointer;
  text-decoration:none;
}

.download{background:#fff;color:#000}
.delete{background:#222;color:red}
.copy{background:#fff;color:#000}
.save{background:#333;color:#fff}

/* ======================
   MODAL CORRIGIDO
====================== */
.modal-bg{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal{
  width:90%;
  max-width:520px;
  background:#111;
  border-radius:14px;
  padding:20px;
}

.modal h3{
  margin-top:0;
}

.modal textarea{
  width:100%;
  height:180px;
  background:#000;
  color:#fff;
  border:1px solid #333;
  border-radius:10px;
  padding:12px;
  font-size:14px;
  outline:none;
}

.modal-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="app">

<header>
  <h1>Drive Final</h1>

  <div style="position:relative">

    <button class="iconBtn" id="plus">+</button>

    <div class="menu" id="menu">
      <button onclick="selectFile()">
        <img src="av.png" width="18"> Arquivo
      </button>

      <button onclick="openModal()">
        <img src="tx.png" width="18"> Texto
      </button>
    </div>

    <input type="file" id="file" multiple style="display:none">
  </div>
</header>

<div class="grid" id="grid"></div>

</div>

<!-- MODAL TEXTO -->
<div class="modal-bg" id="modal">
  <div class="modal">

    <h3>Escreva seu texto</h3>

    <textarea id="textInput" placeholder="Digite aqui..."></textarea>

    <div class="modal-actions">
      <button onclick="closeModal()">Cancelar</button>
      <button class="save" onclick="saveText()">Salvar</button>
    </div>

  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
"https://uosubywnpexfdykxrsda.supabase.co",
"sb_publishable_c7Gcs7TYe8elQ-lZ50cjUA_EERGehuQ"
);

const BUCKET="arquivos";
const TABLE="arquivos";

const grid=document.getElementById("grid");
const menu=document.getElementById("menu");
const fileInput=document.getElementById("file");

/* MENU */
document.getElementById("plus").onclick=()=>{
  menu.style.display = menu.style.display==="flex"?"none":"flex";
};

document.addEventListener("click",(e)=>{
  if(!menu.contains(e.target) && e.target.id!=="plus"){
    menu.style.display="none";
  }
});

/* MODAL */
window.openModal=()=>{
  document.getElementById("modal").style.display="flex";
};

window.closeModal=()=>{
  document.getElementById("modal").style.display="none";
};

window.saveText=async()=>{

  const text=document.getElementById("textInput").value;

  if(!text) return;

  await supabase.from(TABLE).insert({
    tipo_item:"text",
    content:text,
    criado_em:new Date()
  });

  document.getElementById("textInput").value="";
  closeModal();
  load();
};

/* FILE UPLOAD */
window.selectFile=()=>{
  fileInput.click();
};

fileInput.onchange=async(e)=>{

  for(let file of e.target.files){

    const path=`${Date.now()}_${file.name}`;

    await supabase.storage.from(BUCKET).upload(path,file);

    const {data}=supabase.storage.from(BUCKET).getPublicUrl(path);

    await supabase.from(TABLE).insert({
      nome:file.name,
      tipo:file.type,
      url:data.publicUrl,
      caminho:path,
      tipo_item:"file",
      criado_em:new Date()
    });
  }

  load();
};

/* LOAD */
async function load(){

  const {data}=await supabase
  .from(TABLE)
  .select("*")
  .order("criado_em",{ascending:false});

  grid.innerHTML="";

  data.forEach((item,i)=>{

    const div=document.createElement("div");
    div.className="card";
    div.style.animationDelay=`${i*120}ms`;

    /* FILE */
    if(item.tipo_item==="file"){

      div.innerHTML=`
        <div class="preview">
          ${item.tipo?.startsWith("image/")
            ? `<img class="real" src="${item.url}">`
            : `<img class="iconFile" src="av.png">`}
        </div>

        <div>${item.nome}</div>

        <a class="download" href="${item.url}" download>Baixar</a>
        <button class="delete" onclick="del('${item.id}','${item.caminho}')">Excluir</button>
      `;
    }

    /* TEXT */
    else{

      div.innerHTML=`
        <div class="preview">
          <img class="iconFile" src="tx.png">
        </div>

        <textarea id="t-${item.id}">${item.content}</textarea>

        <div class="actions">
          <button class="copy" onclick="copy('${item.id}')">Copiar</button>
          <button class="save" onclick="save('${item.id}')">Salvar</button>
          <button class="delete" onclick="del('${item.id}','')">Excluir</button>
        </div>
      `;
    }

    grid.appendChild(div);
  });
}

/* TEXT ACTIONS */
window.copy=(id)=>{
  const t=document.getElementById("t-"+id);
  navigator.clipboard.writeText(t.value);
};

window.save=async(id)=>{
  const t=document.getElementById("t-"+id);

  await supabase
  .from(TABLE)
  .update({content:t.value})
  .eq("id",id);
};

window.del=async(id,path)=>{

  if(path){
    await supabase.storage.from(BUCKET).remove([path]);
  }

  await supabase.from(TABLE).delete().eq("id",id);

  load();
};

load();
</script>

</body>
</html>
