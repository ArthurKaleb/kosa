<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arquivos na Nuvem</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #050505;
      color: #fff;
    }

    .app {
      max-width: 1100px;
      margin: auto;
      padding: 30px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 26px;
    }

    .btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 1px solid #333;
      background: #111;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
    }

    .btn:hover {
      background: #fff;
      color: #000;
    }

    input {
      display: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      background: #111;
      border: 1px solid #222;
      padding: 12px;
      border-radius: 12px;
    }

    .preview {
      height: 140px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    img, video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .name {
      font-size: 13px;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      gap: 5px;
    }

    .actions a, .actions button {
      flex: 1;
      padding: 7px;
      border: none;
      font-size: 12px;
      cursor: pointer;
      border-radius: 6px;
      text-align: center;
      text-decoration: none;
    }

    .open {
      background: #fff;
      color: #000;
    }

    .delete {
      background: #222;
      color: red;
    }
  </style>
</head>

<body>
  <div class="app">

    <header>
      <h1>Arquivos na Nuvem</h1>
      <button class="btn" id="upload">+</button>
      <input type="file" id="file" multiple />
    </header>

    <div class="grid" id="grid"></div>

  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    // ✅ CORRIGIDO (SEM /rest/v1)
    const SUPABASE_URL = "https://uosubywnpexfdykxrsda.supabase.co";

    // ✅ SUA CHAVE PUBLICA
    const SUPABASE_KEY = "sb_publishable_c7Gcs7TYe8elQ-lZ50cjUA_EERGehuQ";

    const BUCKET = "arquivos";
    const TABLE = "arquivos";

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const btn = document.getElementById("upload");
    const fileInput = document.getElementById("file");
    const grid = document.getElementById("grid");

    btn.onclick = () => fileInput.click();

    fileInput.onchange = async (e) => {
      const files = e.target.files;

      for (let file of files) {

        const path = `${Date.now()}_${file.name}`;

        // UPLOAD STORAGE
        const { error: uploadError } = await supabase.storage
          .from(BUCKET)
          .upload(path, file);

        if (uploadError) {
          console.log("Erro upload:", uploadError.message);
          continue;
        }

        // URL PUBLICA
        const { data } = supabase.storage
          .from(BUCKET)
          .getPublicUrl(path);

        // BANCO
        const { error: dbError } = await supabase
          .from(TABLE)
          .insert({
            nome: file.name,
            tipo: file.type,
            url: data.publicUrl,
            caminho: path,
            tamanho: file.size,
            criado_em: new Date()
          });

        if (dbError) {
          console.log("Erro DB:", dbError.message);
        }
      }

      loadFiles();
    };

    async function loadFiles() {

      const { data, error } = await supabase
        .from(TABLE)
        .select("*")
        .order("criado_em", { ascending: false });

      if (error) {
        console.log("Erro SELECT:", error.message);
        return;
      }

      grid.innerHTML = "";

      if (!data || data.length === 0) {
        grid.innerHTML = "<p>Nenhum arquivo</p>";
        return;
      }

      data.forEach(file => {

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="preview">
            ${file.tipo?.startsWith("image/")
              ? `<img src="${file.url}">`
              : file.tipo?.startsWith("video/")
              ? `<video src="${file.url}" controls></video>`
              : "📄"}
          </div>

          <div class="name">${file.nome}</div>

          <div class="actions">
            <a class="open" href="${file.url}" target="_blank">Abrir</a>
            <button class="delete" onclick="del('${file.id}','${file.caminho}')">Excluir</button>
          </div>
        `;

        grid.appendChild(card);
      });
    }

    window.del = async (id, path) => {

      await supabase.storage.from(BUCKET).remove([path]);

      await supabase.from(TABLE).delete().eq("id", id);

      loadFiles();
    };

    loadFiles();
  </script>

</body>
</html>
